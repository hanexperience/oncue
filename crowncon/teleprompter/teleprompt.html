<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>OnCue Prompter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #0A0A0A;
      --ink2: #161616;
      --bone: #F2EDE2;
      --hi: #E5FF3D;
      --rust: #E5542A;
      --rule: #2A2A2A;
      --light: #6B6560;
      --bar-h: 80px;
    }

    html, body {
      height: 100%; height: 100dvh;
      overflow: hidden;
      background: #000;
      color: var(--bone);
      font-family: system-ui, -apple-system, sans-serif;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    /* ── MAIN LAYOUT ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* ── VIEWPORT (camera + prompter) ── */
    #viewport {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #000;
    }

    #preview {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    #preview.mirror { transform: scaleX(-1); }

    /* ── PROMPTER OVERLAY ── */
    #prompter-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      pointer-events: none;
      /* Semi-transparent bg — shows face behind text */
      background: rgba(0,0,0,0);
      transition: background 0.4s ease;
    }

    /* In fullscreen mode, show the overlay bg */
    #app.fullscreen #prompter-overlay {
      background: rgba(0,0,0,0.45);
    }

    /* top fade */
    #prompter-overlay::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 80px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.85), transparent);
      z-index: 2;
      pointer-events: none;
    }
    /* bottom fade */
    #prompter-overlay::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 120px;
      background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
      z-index: 2;
      pointer-events: none;
    }

    /* ── SCROLL CONTAINER ── */
    #scroll-window {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    #scroll-track {
      padding-bottom: 40px;
      will-change: transform;
    }

    #prompter-text {
      font-size: 32px;
      line-height: 1.6;
      font-weight: 600;
      color: #fff;
      text-align: center;
      white-space: pre-wrap;
      padding: 0 28px;
      text-shadow: 0 2px 16px rgba(0,0,0,0.95), 0 0 40px rgba(0,0,0,0.7);
      word-break: break-word;
    }

    /* ── FOCUS LINE — where reader's eyes sit ── */
    #focus-line {
      position: absolute;
      left: 0; right: 0;
      top: 38%;
      height: 2px;
      background: var(--hi);
      opacity: 0.6;
      z-index: 3;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    #focus-line.hidden { opacity: 0; }

    /* ── LENS HINT ── */
    #lens-hint {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--hi);
      font-family: monospace;
      z-index: 4;
      opacity: 0.7;
    }

    /* ── REC TIMER ── */
    #rec-timer {
      position: absolute;
      top: 12px; right: 12px;
      font-family: monospace;
      font-size: 13px;
      color: #fff;
      background: var(--rust);
      padding: 5px 11px;
      display: none;
      z-index: 6;
    }
    #rec-timer.show { display: block; }
    .rec-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #fff;
      margin-right: 5px;
      animation: pulse 1.2s infinite;
    }
    @keyframes pulse { 50% { opacity: 0.2; } }

    /* ── COUNTDOWN ── */
    #countdown {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 140px;
      font-weight: 800;
      color: var(--hi);
      background: rgba(0,0,0,0.6);
      z-index: 10;
    }

    /* ── PAUSE OVERLAY ── */
    #pause-overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 5;
      pointer-events: none;
    }
    #pause-overlay.show { display: flex; }
    #pause-badge {
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-family: monospace;
      color: var(--hi);
      background: rgba(0,0,0,0.6);
      padding: 8px 20px;
      border: 1px solid var(--hi);
    }

    /* ── TAP TO PAUSE ── */
    #tap-zone {
      position: absolute;
      inset: 0;
      z-index: 4;
      cursor: pointer;
    }

    /* ── FULLSCREEN RECORDING MODE ── */
    /* Viewport expands to fill whole screen */
    #app.fullscreen #viewport {
      position: fixed;
      inset: 0;
      z-index: 20;
    }
    /* Controls bar hides below screen */
    #app.fullscreen #controls {
      transform: translateY(100%);
      pointer-events: none;
    }

    /* Floating stop bar — appears during recording */
    #float-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 30;
      background: rgba(10,10,10,0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 10px 14px 18px;
      display: none;
      flex-direction: column;
      gap: 8px;
      transform: translateY(100%);
      transition: transform 0.3s ease;
    }
    #float-bar.show {
      display: flex;
      transform: translateY(0);
    }
    #float-bar .ctrl-row { display: flex; align-items: center; gap: 8px; }
    #float-bar .slider-group { flex: 1; display: flex; align-items: center; gap: 8px; }
    #float-bar .slider-label { font-family: monospace; font-size: 10px; color: var(--light); text-transform: uppercase; }

    /* ── BOTTOM CONTROLS ── */
    #controls {
      flex-shrink: 0;
      background: var(--ink);
      border-top: 1px solid var(--rule);
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: transform 0.3s ease;
    }

    /* Main action row */
    .ctrl-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn {
      background: var(--bone);
      color: var(--ink);
      border: none;
      padding: 0 16px;
      height: 44px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      font-size: 12px;
      white-space: nowrap;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn:active:not(:disabled) { opacity: 0.75; }

    .btn-primary { background: var(--hi); color: var(--ink); }
