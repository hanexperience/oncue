<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OnCue Prompter & Recorder</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --ink:#0A0A0A; --bone:#F2EDE2; --hi:#E5FF3D; --rust:#E5542A; --rule:#2A2A2A; --light:#A09A94; }
    body { background:var(--ink); color:var(--bone); font-family:system-ui,-apple-system,sans-serif; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

    .viewport { flex:1; position:relative; background:#000; display:flex; align-items:center; justify-content:center; }
    video { width:100%; height:100%; object-fit:cover; }
    video.mirror { transform:scaleX(-1); }

    /* Teleprompter overlay — scrolls */
    .prompter-box { position:absolute; top:16px; left:50%; transform:translateX(-50%); width:92%; max-width:680px;
      height:38%; background:rgba(10,10,10,0.82); border:1px solid var(--rule); padding:18px 22px;
      overflow:hidden; backdrop-filter:blur(8px); }
    .prompter-scroll { will-change:transform; }
    .prompter-text { font-size:26px; line-height:1.55; font-weight:600; color:#fff; text-align:center; white-space:pre-wrap; }
    .lens-hint { position:absolute; top:2px; left:50%; transform:translateX(-50%); font-size:9px; letter-spacing:1px;
      text-transform:uppercase; color:var(--hi); font-family:monospace; }

    /* Countdown + timer */
    .countdown { position:absolute; inset:0; display:none; align-items:center; justify-content:center;
      font-size:120px; font-weight:800; color:var(--hi); background:rgba(0,0,0,0.5); z-index:5; }
    .rec-timer { position:absolute; top:14px; right:16px; font-family:monospace; font-size:13px; color:#fff;
      background:var(--rust); padding:4px 10px; display:none; z-index:6; }
    .rec-timer.show { display:block; }
    .rec-dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#fff; margin-right:6px; animation:pulse 1.2s infinite; }
    @keyframes pulse { 50% { opacity:0.3; } }

    /* Controls */
    .controls { border-top:1px solid var(--rule); background:var(--ink); padding:12px 14px;
      display:flex; flex-wrap:wrap; align-items:center; justify-content:center; gap:10px; z-index:10; }
    .btn { background:var(--bone); color:var(--ink); border:none; padding:11px 18px; font-weight:700;
      text-transform:uppercase; letter-spacing:0.5px; cursor:pointer; font-size:12px; }
    .btn:disabled { opacity:0.35; cursor:not-allowed; }
    .btn-record { background:var(--rust); color:#fff; }
    .btn-record.recording { background:#fff; color:var(--ink); }
    .ctrl-group { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--light); font-family:monospace; }
    input[type=range] { width:90px; accent-color:var(--hi); }
    select { background:#000; color:var(--bone); border:1px solid var(--rule); padding:6px; font-size:11px; }
    .status { font-family:monospace; font-size:11px; color:var(--hi); min-width:120px; }

    /* Script editor panel */
    .panel { position:absolute; inset:0; background:rgba(10,10,10,0.96); z-index:20; display:none;
      flex-direction:column; padding:24px; gap:14px; }
    .panel.show { display:flex; }
    .panel h2 { font-size:14px; text-transform:uppercase; letter-spacing:1px; }
    .panel textarea { flex:1; background:#000; color:var(--bone); border:1px solid var(--rule); padding:14px;
      font-size:16px; line-height:1.5; resize:none; }
    .panel-row { display:flex; gap:10px; justify-content:flex-end; }
  </style>
</head>
<body>

  <div class="viewport">
    <video id="preview" class="mirror" autoplay muted playsinline></video>
    <div class="prompter-box">
      <span class="lens-hint">▲ eyes here, near lens</span>
      <div class="prompter-scroll" id="scroll">
        <p class="prompter-text" id="prompter-target">Tap “Script” to load your lines, then “Enable Camera”. Press record and the script scrolls automatically — keep your eyes here.</p>
      </div>
    </div>
    <div class="countdown" id="countdown"></div>
    <div class="rec-timer" id="rec-timer"><span class="rec-dot"></span><span id="timer-val">0:00</span></div>
  </div>

  <div class="controls">
    <button class="btn" id="btn-script" onclick="openPanel()">Script</button>
    <button class="btn" id="btn-camera" onclick="initCamera()">Enable Camera</button>
    <button class="btn btn-record" id="btn-record" onclick="toggleRecording()" disabled>Record</button>
    <button class="btn" id="btn-review" onclick="reviewVideo()" disabled>Review</button>
    <button class="btn" id="btn-upload" onclick="uploadVideo()" disabled>Upload</button>
    <button class="btn" id="btn-download" onclick="downloadVideo()" disabled>Save File</button>
    <div class="ctrl-group">Speed <input type="range" id="speed" min="10" max="120" value="45"></div>
    <div class="ctrl-group">Size <input type="range" id="fontsize" min="16" max="44" value="26"></div>
    <select id="camsel" onchange="initCamera()" style="display:none"></select>
    <span class="status" id="status"></span>
  </div>

  <div class="panel" id="panel">
    <h2>Recording Script</h2>
    <textarea id="script-input" placeholder="Paste or type the script the client should read..."></textarea>
    <div class="panel-row">
      <button class="btn" onclick="closePanel()">Cancel</button>
      <button class="btn btn-record" onclick="saveScript()">Use Script</button>
    </div>
  </div>

  <script>
    // ── Supabase config (publishable key = safe to expose; bucket allows anon insert only) ──
    const SUPABASE_URL = 'https://rrxveifshucpinajtkgf.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_548FF3LDIHbz55iHtylFZw_HKBW06Aj';
    const BUCKET = 'recordings';

    // ── State ──
    let stream=null, mediaRecorder=null, recordedChunks=[], finalBlob=null, finalExt='webm';
    let scrollRAF=null, scrollPos=0, timerInt=null, secs=0;

    const $ = id => document.getElementById(id);
    const videoEl=$('preview'), btnCam=$('btn-camera'), btnRec=$('btn-record'),
          btnReview=$('btn-review'), btnUp=$('btn-upload'), btnDl=$('btn-download'), statusEl=$('status');

    // ── Script: preload via ?script= or ?c=<client code> (future), else editable ──
    (function loadScript(){
      const p = new URLSearchParams(location.search);
      const s = p.get('script');
      if (s) setScript(decodeURIComponent(s));
    })();
    function setScript(t){ $('prompter-target').textContent = t; $('script-input').value = t; }
    function openPanel(){ $('panel').classList.add('show'); }
    function closePanel(){ $('panel').classList.remove('show'); }
    function saveScript(){ const t=$('script-input').value.trim(); if(t) setScript(t); closePanel(); }

    $('fontsize').addEventListener('input', e => { $('prompter-target').style.fontSize = e.target.value+'px'; });

    // ── Camera ──
    async function initCamera(){
      try{
        statusEl.textContent='Connecting…';
        if(stream) stream.getTracks().forEach(t=>t.stop());
        const sel=$('camsel').value;
        stream = await navigator.mediaDevices.getUserMedia({
          video: sel ? {deviceId:{exact:sel},width:1280,height:720} : {width:1280,height:720,facingMode:'user'},
          audio:true
        });
        videoEl.srcObject=stream; videoEl.srcObject && (videoEl.muted=true);
        videoEl.play();
        btnRec.disabled=false; statusEl.textContent='Ready';
        // populate camera list once permission granted
        const devs=(await navigator.mediaDevices.enumerateDevices()).filter(d=>d.kind==='videoinput');
        if(devs.length>1){ const cs=$('camsel'); cs.style.display='inline-block';
          cs.innerHTML=devs.map(d=>`<option value="${d.deviceId}">${d.label||'Camera'}</option>`).join(''); }
      }catch(err){ statusEl.textContent='Camera/mic access required.'; }
    }

    // ── Prompter scroll ──
    function startScroll(){
      const box=$('scroll'); scrollPos=0; box.style.transform='translateY(0)';
      const speed=()=>parseInt($('speed').value,10)/60; // px per frame approx
      function step(){ scrollPos+=speed(); box.style.transform=`translateY(${-scrollPos}px)`; scrollRAF=requestAnimationFrame(step); }
      scrollRAF=requestAnimationFrame(step);
    }
    function stopScroll(){ if(scrollRAF) cancelAnimationFrame(scrollRAF); scrollRAF=null; }

    // ── Recording ──
    function toggleRecording(){ (!mediaRecorder||mediaRecorder.state==='inactive') ? countdownStart() : stopRecording(); }
    function countdownStart(){
      const cd=$('countdown'); let n=3; cd.style.display='flex'; cd.textContent=n;
      const iv=setInterval(()=>{ n--; if(n<=0){ clearInterval(iv); cd.style.display='none'; startRecording(); } else cd.textContent=n; },800);
    }
    function startRecording(){
      recordedChunks=[]; finalBlob=null; btnUp.disabled=true; btnDl.disabled=true; btnReview.disabled=true;
      let mime='video/webm';
      if(MediaRecorder.isTypeSupported('video/mp4')) mime='video/mp4';
      else if(MediaRecorder.isTypeSupported('video/webm;codecs=vp9')) mime='video/webm;codecs=vp9';
      finalExt = mime.includes('mp4')?'mp4':'webm';
      mediaRecorder=new MediaRecorder(stream,{mimeType:mime});
      mediaRecorder.ondataavailable=e=>{ if(e.data&&e.data.size>0) recordedChunks.push(e.data); };
      mediaRecorder.onstop=()=>{ finalBlob=new Blob(recordedChunks,{type:mime});
        btnUp.disabled=false; btnDl.disabled=false; btnReview.disabled=false;
        statusEl.textContent=`Ready · ${(finalBlob.size/1048576).toFixed(1)}MB`; };
      mediaRecorder.start();
      btnRec.textContent='Stop'; btnRec.classList.add('recording'); statusEl.textContent='Recording…';
      startScroll(); secs=0; $('rec-timer').classList.add('show'); $('timer-val').textContent='0:00';
      timerInt=setInterval(()=>{ secs++; $('timer-val').textContent=`${Math.floor(secs/60)}:${String(secs%60).padStart(2,'0')}`; },1000);
    }
    function stopRecording(){ mediaRecorder.stop(); btnRec.textContent='Record'; btnRec.classList.remove('recording');
      stopScroll(); clearInterval(timerInt); $('rec-timer').classList.remove('show'); }

    // ── Review (watch back) ──
    function reviewVideo(){ if(!finalBlob) return; videoEl.srcObject=null; videoEl.classList.remove('mirror');
      videoEl.src=URL.createObjectURL(finalBlob); videoEl.muted=false; videoEl.controls=true; videoEl.play();
      statusEl.textContent='Reviewing — press Record to redo'; }

    // ── Download fallback ──
    function downloadVideo(){ if(!finalBlob) return; const a=document.createElement('a');
      a.href=URL.createObjectURL(finalBlob); a.download=`recording-${Date.now()}.${finalExt}`; a.click(); }

    // ── Upload straight to Supabase Storage ──
    async function uploadVideo(){
      if(!finalBlob) return;
      btnUp.disabled=true; statusEl.textContent='Uploading…';
      const path=`uploads/${Date.now()}-${Math.random().toString(36).slice(2,8)}.${finalExt}`;
      try{
        const res=await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${path}`,{
          method:'POST',
          headers:{ 'apikey':SUPABASE_KEY, 'Authorization':'Bearer '+SUPABASE_KEY, 'Content-Type':finalBlob.type, 'x-upsert':'false' },
          body:finalBlob
        });
        if(!res.ok) throw new Error('HTTP '+res.status);
        statusEl.textContent='Uploaded ✓ Thank you!';
      }catch(err){ statusEl.textContent='Upload failed — use Save File'; btnUp.disabled=false; btnDl.disabled=false; }
    }
  </script>
</body>
</html>
