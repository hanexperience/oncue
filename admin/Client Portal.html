<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Client Portal · OnCue</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:wght@400;500;600;700;800&family=Archivo:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Evolved OnCue palette — warm paper light theme */
      --paper:     #F3EDE1;   /* page background, warm */
      --paper-2:   #ECE4D4;   /* sunken / weekend cells */
      --surface:   #FBF7EF;   /* cards */
      --surface-hi:#FFFFFF;   /* lifted elements */
      --ink:       #17140E;   /* headings, near-black warm */
      --ink-soft:  #3D372D;   /* body text */
      --muted:     #8A8071;   /* labels, meta */
      --muted-2:   #B0A693;   /* faint */
      --line:      #E1D8C5;   /* hairline */
      --line-2:    #D2C7B0;   /* stronger hairline */
      --hi:        #E5FF3D;   /* highlighter yellow */
      --hi-ink:    #4A5200;   /* text usable on light when paired w/ yellow accents */
      --rust:      #E5542A;   /* action / warm accent */
      --rust-tint: #FBEADF;   /* rust wash */
      --green:     #3F7A34;   /* published */
      --green-tint:#E7EFDD;
      --shadow:    0 1px 2px rgba(23,20,14,.04), 0 18px 40px -28px rgba(23,20,14,.28);
      --shadow-sm: 0 1px 2px rgba(23,20,14,.05);
      --r:   12px;
      --r-sm: 8px;
    }

    html, body { height: 100%; }
    body {
      font-family: 'Archivo', sans-serif;
      background: var(--paper);
      color: var(--ink-soft);
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .mono { font-family: 'JetBrains Mono', monospace; }
    .cond { font-family: 'Archivo Narrow', sans-serif; }

    /* highlighter mark used in the wordmark */
    .mark {
      background: var(--hi);
      box-shadow: 0 0 0 2px var(--hi);
      border-radius: 2px;
      color: var(--ink);
      padding: 0 .5px;
    }

    /* ─────────────────────────────  LOGIN  ───────────────────────────── */
    #login-screen {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 20px;
      background:
        radial-gradient(1200px 520px at 50% -10%, rgba(229,255,61,.16), transparent 60%),
        var(--paper);
    }
    .login-wordmark {
      font-family: 'Archivo Narrow', sans-serif;
      font-weight: 800; font-size: 24px; letter-spacing: -.5px;
      text-transform: uppercase; color: var(--ink);
      margin-bottom: 40px;
    }
    .login-box {
      width: 100%; max-width: 400px;
      border: 1px solid var(--line);
      border-radius: var(--r);
      padding: 40px 36px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }
    .login-box h1 {
      font-family: 'Archivo Narrow', sans-serif;
      font-weight: 800; font-size: 26px;
      text-transform: uppercase; letter-spacing: -.4px;
      color: var(--ink); margin-bottom: 4px;
    }
    .login-box .sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: var(--muted);
      text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 30px;
    }
    .login-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px;
      color: var(--muted); display: block; margin-bottom: 8px;
    }
    .login-input {
      width: 100%; background: var(--surface-hi);
      border: 1px solid var(--line-2);
      border-radius: var(--r-sm);
      color: var(--ink); font-family: 'Archivo', sans-serif;
      font-size: 15px; padding: 13px 14px; outline: none;
      margin-bottom: 22px; transition: border-color .15s, box-shadow .15s;
    }
    .login-input:focus { border-color: var(--ink); box-shadow: 0 0 0 3px rgba(229,255,61,.45); }
    .btn-primary {
      width: 100%; background: var(--ink); color: var(--paper);
      border: none; border-radius: var(--r-sm);
      font-family: 'Archivo Narrow', sans-serif;
      font-weight: 800; font-size: 14px;
      text-transform: uppercase; letter-spacing: 1px;
      padding: 15px; cursor: pointer;
      transition: transform .12s, background .15s;
    }
    .btn-primary:hover { background: #000; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: .5; cursor: default; transform: none; }
    .login-error {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: var(--rust);
      margin-top: 14px; display: none;
    }
    .login-foot {
      margin-top: 28px; font-family: 'JetBrains Mono', monospace;
      font-size: 10px; letter-spacing: .5px; color: var(--muted-2);
      text-align: center;
    }

    /* ─────────────────────────────  PORTAL  ───────────────────────────── */
    #portal { display: none; min-height: 100vh; }

    .topbar {
      border-bottom: 1px solid var(--line);
      padding: 0 32px; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 30;
      background: rgba(243,237,225,.86);
      backdrop-filter: blur(10px);
    }
    .topbar-wordmark {
      font-family: 'Archivo Narrow', sans-serif;
      font-weight: 800; font-size: 19px;
      text-transform: uppercase; letter-spacing: -.3px; color: var(--ink);
    }
    .topbar-right { display: flex; align-items: center; gap: 18px; }
    .topbar-client {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
      color: var(--muted);
    }
    .topbar-logout {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
      color: var(--muted); cursor: pointer; background: none;
      border: 1px solid var(--line-2); border-radius: 999px;
      padding: 6px 14px; transition: all .15s;
    }
    .topbar-logout:hover { color: var(--ink); border-color: var(--ink); }

    .portal-main { max-width: 1080px; margin: 0 auto; padding: 44px 32px 96px; }

    .kicker {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; text-transform: uppercase; letter-spacing: 1.8px;
      color: var(--rust); margin-bottom: 10px;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .kicker::before { content: ""; width: 18px; height: 1.5px; background: var(--rust); }

    h1.display {
      font-family: 'Archivo Narrow', sans-serif;
      font-weight: 800; font-size: clamp(34px, 5vw, 52px);
      text-transform: uppercase; letter-spacing: -1px; line-height: 1.02;
      color: var(--ink); margin-bottom: 10px; text-wrap: balance;
    }
    .lede { font-size: 15px; color: var(--muted); max-width: 60ch; }

    /* attention banner */
    .alert {
      margin: 26px 0 0; display: flex; align-items: center; gap: 14px;
      background: var(--rust-tint); border: 1px solid #F3C9B8;
      border-radius: var(--r); padding: 14px 18px; cursor: pointer;
      transition: transform .12s, box-shadow .15s;
    }
    .alert:hover { transform: translateY(-1px); box-shadow: var(--shadow-sm); }
    .alert-dot {
      width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
      background: var(--rust); color: #fff; display: grid; place-items: center;
      font-family: 'Archivo Narrow', sans-serif; font-weight: 800; font-size: 16px;
    }
    .alert-text { flex: 1; font-size: 13.5px; color: var(--ink); }
    .alert-text strong { font-weight: 700; }
    .alert-go {
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      text-transform: uppercase; letter-spacing: 1px; color: var(--rust); flex-shrink: 0;
    }

    /* hero / project card */
    .hero {
      margin-top: 30px;
      border: 1px solid var(--line); border-radius: var(--r);
      background: var(--surface); box-shadow: var(--shadow);
      overflow: hidden;
    }
    .hero-body {
      padding: 26px 30px;
      display: flex; justify-content: space-between; align-items: flex-start;
      gap: 28px; flex-wrap: wrap;
    }
    .hero-left h2 {
      font-family: 'Archivo Narrow', sans-serif;
      font-weight: 700; font-size: 24px; text-transform: uppercase;
      letter-spacing: -.3px; color: var(--ink); margin-bottom: 4px;
    }
    .hero-left p { font-size: 13.5px; color: var(--muted); }
    .badge-stack { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
    .pill {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
      padding: 5px 12px; border-radius: 999px;
      border: 1px solid var(--line-2); color: var(--muted);
      display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
    }
    .pill.live { border-color: var(--green); color: var(--green); background: var(--green-tint); }
    .pill.live::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: var(--green); }

    .hero-foot {
      border-top: 1px solid var(--line);
      padding: 13px 30px; display: flex; justify-content: space-between;
      flex-wrap: wrap; gap: 10px; background: rgba(0,0,0,.012);
    }
    .hero-foot span {
      font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
      text-transform: uppercase; letter-spacing: .8px; color: var(--muted);
    }
    .hero-foot strong { color: var(--ink); font-weight: 600; }

    /* section heads */
    .sec { margin-top: 52px; }
    .sec-head { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; margin-bottom: 18px; }
    .sec-title {
      font-family: 'Archivo Narrow', sans-serif;
      font-weight: 800; font-size: 22px; text-transform: uppercase;
      letter-spacing: -.4px; color: var(--ink);
    }
    .sec-note { font-size: 13px; color: var(--muted); }

    /* package banner */
    .package {
      border: 1px solid var(--line); border-radius: var(--r);
      background:
        linear-gradient(180deg, rgba(229,255,61,.10), transparent 70%),
        var(--surface);
      box-shadow: var(--shadow);
      padding: 24px 28px; display: flex; justify-content: space-between;
      align-items: center; gap: 28px; flex-wrap: wrap;
    }
    .package-eyebrow {
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      text-transform: uppercase; letter-spacing: 1.5px; color: var(--rust); margin-bottom: 6px;
    }
    .package-name {
      font-family: 'Archivo Narrow', sans-serif; font-weight: 800; font-size: 26px;
      text-transform: uppercase; letter-spacing: -.4px; line-height: 1; color: var(--ink);
    }
    .package-name small {
      display: block; font-family: 'JetBrains Mono', monospace; font-weight: 400;
      font-size: 11px; letter-spacing: 1px; color: var(--muted); margin-top: 9px; text-transform: none;
    }
    .quota-grid { display: flex; gap: 26px; flex-wrap: wrap; }
    .quota-item { min-width: 72px; }
    .quota-count {
      font-family: 'Archivo Narrow', sans-serif; font-weight: 800; font-size: 24px;
      line-height: 1; color: var(--ink);
    }
    .quota-count .used { color: var(--ink); }
    .quota-count .of { color: var(--muted-2); font-weight: 600; }
    .quota-label {
      font-family: 'JetBrains Mono', monospace; font-size: 9px;
      text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-top: 8px;
    }
    .quota-bar { height: 5px; background: var(--line-2); border-radius: 999px; margin-top: 8px; overflow: hidden; }
    .quota-bar > span { display: block; height: 100%; background: var(--ink); border-radius: 999px; }
    .quota-bar.full > span { background: var(--rust); }

    /* phase tracker */
    .phases { display: grid; grid-auto-flow: column; grid-auto-columns: 1fr; gap: 12px; }
    .phase {
      border: 1px solid var(--line); border-radius: var(--r-sm);
      background: var(--surface); padding: 18px 16px; position: relative;
    }
    .phase.is-done { background: var(--surface); }
    .phase.is-active { border-color: var(--ink); box-shadow: var(--shadow); }
    .phase-num {
      font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted);
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;
    }
    .phase-name {
      font-family: 'Archivo Narrow', sans-serif; font-weight: 700; font-size: 15px;
      text-transform: uppercase; letter-spacing: .2px; margin-bottom: 14px; color: var(--ink);
    }
    .phase-status {
      font-family: 'JetBrains Mono', monospace; font-size: 9.5px;
      text-transform: uppercase; letter-spacing: .8px;
      padding: 4px 9px; border-radius: 999px; display: inline-flex; align-items: center; gap: 6px;
    }
    .phase-status.done { background: var(--ink); color: var(--paper); }
    .phase-status.done::before { content: "✓"; }
    .phase-status.active { background: var(--hi); color: var(--ink); font-weight: 500; }
    .phase-status.pending { border: 1px solid var(--line-2); color: var(--muted); }

    /* two-col cards */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .card {
      border: 1px solid var(--line); border-radius: var(--r);
      background: var(--surface); box-shadow: var(--shadow-sm); padding: 24px 26px;
    }
    .card-label {
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted);
      margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between;
    }
    .card-count {
      font-family: 'Archivo Narrow', sans-serif; font-weight: 800; font-size: 13px;
      color: var(--ink); background: var(--hi); border-radius: 999px; padding: 2px 9px; letter-spacing: 0;
    }

    .legend { display: flex; gap: 18px; margin-bottom: 14px; flex-wrap: wrap; }
    .legend-item {
      display: flex; align-items: center; gap: 7px;
      font-family: 'JetBrains Mono', monospace; font-size: 9.5px;
      text-transform: uppercase; letter-spacing: .8px; color: var(--muted);
    }
    .legend-dot { width: 9px; height: 9px; border-radius: 50%; }

    /* next steps */
    .steps { list-style: none; }
    .step { padding: 13px 0; border-bottom: 1px solid var(--line); display: flex; gap: 13px; align-items: flex-start; }
    .step:last-child { border-bottom: none; padding-bottom: 0; }
    .step-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; margin-top: 6px; }
    .step-dot.oncue { background: var(--ink); }
    .step-dot.client { background: var(--rust); }
    .step-dot.waiting { background: var(--muted-2); }
    .step-text { font-size: 13.5px; color: var(--ink-soft); flex: 1; }
    .step-owner {
      font-family: 'JetBrains Mono', monospace; font-size: 9.5px;
      text-transform: uppercase; letter-spacing: .8px; color: var(--muted); flex-shrink: 0;
      border: 1px solid var(--line-2); border-radius: 999px; padding: 3px 9px;
    }
    .step-owner.client { color: var(--rust); border-color: #F0C7B7; background: var(--rust-tint); }
    .step-owner.oncue { color: var(--ink); border-color: var(--line-2); }

    /* decisions */
    .decision { padding: 12px 0; border-bottom: 1px solid var(--line); display: flex; gap: 16px; align-items: baseline; }
    .decision:last-child { border-bottom: none; padding-bottom: 0; }
    .decision-date {
      font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted);
      text-transform: uppercase; letter-spacing: .6px; flex-shrink: 0; width: 72px;
    }
    .decision-text { font-size: 13.5px; color: var(--ink-soft); }

    /* deliverables */
    .deliverable { padding: 14px 0; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 14px; }
    .deliverable:last-child { border-bottom: none; padding-bottom: 0; }
    .deliverable-icon {
      font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--ink);
      text-transform: uppercase; letter-spacing: .5px; width: 42px; flex-shrink: 0;
      border: 1px solid var(--line-2); border-radius: 5px; padding: 4px 0; text-align: center;
    }
    .deliverable-name { font-size: 14px; color: var(--ink); flex: 1; }
    .deliverable-link {
      font-family: 'JetBrains Mono', monospace; font-size: 10px; text-transform: uppercase;
      letter-spacing: .8px; color: var(--ink); text-decoration: none;
      padding: 6px 12px; border: 1px solid var(--ink); border-radius: 999px;
      transition: all .15s; flex-shrink: 0;
    }
    .deliverable-link:hover { background: var(--ink); color: var(--paper); }
    .deliverable-status {
      font-family: 'JetBrains Mono', monospace; font-size: 10px; text-transform: uppercase;
      letter-spacing: .8px; color: var(--muted); padding: 6px 12px;
      border: 1px solid var(--line-2); border-radius: 999px; flex-shrink: 0;
    }

    /* calendar */
    .cal-toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
    .cal-month {
      font-family: 'Archivo Narrow', sans-serif; font-weight: 800; font-size: 20px;
      text-transform: uppercase; letter-spacing: -.3px; color: var(--ink);
    }
    .cal-legend { display: flex; gap: 14px; flex-wrap: wrap; }
    .cal-legend .legend-dot { border-radius: 3px; }
    .cal-grid {
      display: grid; grid-template-columns: repeat(7, 1fr);
      border: 1px solid var(--line); border-radius: var(--r); overflow: hidden;
      background: var(--surface); box-shadow: var(--shadow-sm);
    }
    .cal-dow {
      font-family: 'JetBrains Mono', monospace; font-size: 9px;
      text-transform: uppercase; letter-spacing: 1px; color: var(--muted);
      padding: 10px 6px; border-bottom: 1px solid var(--line);
      border-right: 1px solid var(--line); text-align: center; background: rgba(0,0,0,.015);
    }
    .cal-dow:nth-child(7n) { border-right: none; }
    .cal-cell { min-height: 104px; padding: 7px; border-bottom: 1px solid var(--line); border-right: 1px solid var(--line); position: relative; }
    .cal-cell:nth-child(7n) { border-right: none; }
    .cal-grid > .cal-cell:nth-last-child(-n+7) { border-bottom: none; }
    .cal-cell.empty { background: var(--paper-2); }
    .cal-date { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--muted); margin-bottom: 6px; }
    .cal-cell.today .cal-date {
      color: var(--ink); background: var(--hi); display: inline-block;
      padding: 2px 7px; border-radius: 999px; font-weight: 500;
    }
    .cal-post {
      display: block; font-family: 'Archivo', sans-serif; font-size: 11px; font-weight: 500;
      line-height: 1.3; padding: 6px 7px; margin-bottom: 5px;
      border-radius: 6px; border-left: 3px solid var(--muted-2);
      background: var(--surface-hi); color: var(--ink); cursor: pointer;
      transition: transform .12s, box-shadow .12s; text-decoration: none;
      box-shadow: var(--shadow-sm);
    }
    .cal-post:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
    .cal-post .ct {
      display: block; font-family: 'JetBrains Mono', monospace; font-size: 8px;
      letter-spacing: .4px; text-transform: uppercase; color: var(--muted); margin-bottom: 2px;
    }
    .cal-post.s-draft     { border-left-color: var(--muted-2); }
    .cal-post.s-approval  { border-left-color: var(--rust); background: var(--rust-tint); }
    .cal-post.s-scheduled { border-left-color: var(--ink); }
    .cal-post.s-published { border-left-color: var(--green); opacity: .82; }

    /* content mix */
    .mix-grid { display: flex; gap: 14px; flex-wrap: wrap; }
    .mix-item {
      flex: 1; min-width: 96px; text-align: center;
      border: 1px solid var(--line); border-radius: var(--r-sm); padding: 16px 10px; background: var(--surface);
    }
    .mix-item.total { background: var(--ink); border-color: var(--ink); }
    .mix-count { font-family: 'Archivo Narrow', sans-serif; font-weight: 800; font-size: 30px; line-height: 1; color: var(--ink); }
    .mix-item.total .mix-count { color: var(--hi); }
    .mix-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-top: 9px; }
    .mix-item.total .mix-label { color: var(--paper); }

    /* pipeline */
    .pipe-row { display: flex; align-items: center; gap: 14px; padding: 15px 0; border-bottom: 1px solid var(--line); }
    .pipe-row:last-child { border-bottom: none; padding-bottom: 0; }
    .pipe-date { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); width: 54px; flex-shrink: 0; text-transform: uppercase; }
    .pipe-type {
      font-family: 'JetBrains Mono', monospace; font-size: 9px; text-transform: uppercase;
      letter-spacing: .4px; color: var(--muted); width: 78px; flex-shrink: 0;
    }
    .pipe-title { font-size: 14px; color: var(--ink); flex: 1; min-width: 130px; font-weight: 500; }
    .pipe-stage {
      font-family: 'JetBrains Mono', monospace; font-size: 9px; text-transform: uppercase;
      letter-spacing: .7px; padding: 4px 10px; border-radius: 999px; flex-shrink: 0;
    }
    .pipe-stage.s-draft     { border: 1px solid var(--line-2); color: var(--muted); }
    .pipe-stage.s-approval  { border: 1px solid var(--rust); color: var(--rust); background: var(--rust-tint); }
    .pipe-stage.s-scheduled { border: 1px solid var(--ink); color: var(--ink); }
    .pipe-stage.s-published { background: var(--green); color: #fff; }
    .pipe-actions { display: flex; gap: 7px; flex-shrink: 0; align-items: center; }
    .pipe-btn {
      font-family: 'JetBrains Mono', monospace; font-size: 9px; text-transform: uppercase;
      letter-spacing: .5px; padding: 7px 12px; border: 1px solid var(--line-2);
      border-radius: 999px; background: var(--surface); cursor: pointer; transition: all .12s; color: var(--ink-soft);
    }
    .pipe-btn.approve { color: var(--ink); border-color: var(--ink); }
    .pipe-btn.approve:hover { background: var(--hi); border-color: var(--ink); }
    .pipe-btn.changes { color: var(--rust); border-color: #F0C7B7; }
    .pipe-btn.changes:hover { background: var(--rust); color: #fff; border-color: var(--rust); }
    .pipe-btn.view { color: var(--ink); text-decoration: none; display: inline-block; }
    .pipe-btn.view:hover { border-color: var(--ink); }
    .pipe-btn.record { color: var(--rust); border-color: var(--rust); text-decoration: none; display: inline-block; font-weight: 600; }
    .pipe-btn.record:hover { background: var(--rust); color: #fff; }
    .done-tag {
      font-family: 'JetBrains Mono', monospace; font-size: 9px; text-transform: uppercase;
      letter-spacing: .5px; color: var(--muted); padding: 6px 0;
    }

    /* recap */
    .recap-card {
      border: 1px solid var(--line); border-radius: var(--r);
      background: var(--surface); box-shadow: var(--shadow-sm); padding: 28px 30px;
    }
    .recap-body { font-size: 14.5px; color: var(--ink-soft); line-height: 1.85; }
    .recap-body p { margin-bottom: 14px; }
    .recap-body p:last-child { margin-bottom: 0; }

    /* contact */
    .contact {
      margin-top: 52px; border: 1px solid var(--line); border-radius: var(--r);
      background: var(--ink); color: var(--paper); padding: 30px 34px;
      display: flex; justify-content: space-between; align-items: center; gap: 20px; flex-wrap: wrap;
    }
    .contact .kicker { color: var(--hi); }
    .contact .kicker::before { background: var(--hi); }
    .contact h3 {
      font-family: 'Archivo Narrow', sans-serif; font-weight: 800; font-size: 22px;
      text-transform: uppercase; letter-spacing: -.3px; color: var(--paper);
    }
    .contact-links { display: flex; gap: 12px; flex-wrap: wrap; }
    .contact-link {
      font-family: 'JetBrains Mono', monospace; font-size: 11px; text-transform: uppercase;
      letter-spacing: .8px; color: var(--ink); text-decoration: none; background: var(--hi);
      padding: 11px 16px; border-radius: 999px; transition: transform .12s;
    }
    .contact-link.alt { background: transparent; color: var(--paper); border: 1px solid rgba(243,237,225,.4); }
    .contact-link:hover { transform: translateY(-1px); }

    .divider { border: none; border-top: 1px solid var(--line); margin: 52px 0; }
    .portal-loading {
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      text-transform: uppercase; letter-spacing: 1px; color: var(--muted);
      padding: 80px 0; text-align: center;
    }

    @media (max-width: 760px) {
      .topbar { padding: 0 18px; }
      .portal-main { padding: 32px 18px 64px; }
      .hero-body { flex-direction: column; gap: 16px; }
      .badge-stack { flex-direction: row; flex-wrap: wrap; align-items: flex-start; }
      .phases { grid-auto-flow: row; grid-auto-columns: auto; }
      .two-col { grid-template-columns: 1fr; }
      .package { flex-direction: column; align-items: flex-start; }
      .cal-cell { min-height: 70px; padding: 4px; }
      .cal-post { font-size: 9px; }
      .pipe-row { flex-wrap: wrap; }
      .pipe-title { width: 100%; flex-basis: 100%; }
      .contact { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

    <div class="login-error" id="login-error">Incorrect access code. Try again.</div>

</div>

<!-- ── PORTAL ── -->
<div id="portal">

      <button class="topbar-logout" onclick="logout()">Log out</button>
    </div>
  </div>
  <div class="portal-main" id="portal-main">
    <div class="portal-loading">Loading…</div>
  </div>
</div>

<script>
  // ── Supabase config (unchanged) ──
  const SUPABASE_URL = 'https://rrxveifshucpinajtkgf.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_548FF3LDIHbz55iHtylFZw_HKBW06Aj';
  const RPC = SUPABASE_URL + '/rest/v1/rpc/';
  // Where the teleprompter lives (adjust if hosted elsewhere)
  const TELEPROMPTER_URL = '../teleprompter/teleprompt.html';
  function teleprompterUrl(p) {
    return TELEPROMPTER_URL + '?post=' + encodeURIComponent(p.id) + '&script=' + encodeURIComponent(p.script || '');
  }

  // ── DEMO MODE ──────────────────────────────────────────────────────────
  // Live on oncue.site; sample data everywhere else (preview/sharing).
  // Add ?demo=1 to force it, or ?live=1 to force the real backend.
  const DEMO = (function () {
    const q = new URLSearchParams(location.search);
    if (q.has('live')) return false;
    if (q.has('demo')) return true;
    return !/(^|\.)oncue\.site$/.test(location.hostname);
  })();

  let CURRENT_CODE = null;

  function rpc(fn, body) {
    if (DEMO) return demoRpc(fn, body);
    return fetch(RPC + fn, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY
      },
      body: JSON.stringify(body)
    }).then(function (r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    });
  }

  function esc(s) {
    if (s === null || s === undefined) return '';
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // ── Auth ──
  function tryLogin() {
    const code = document.getElementById('pw').value.trim();
    const btn = document.getElementById('login-btn');
    const err = document.getElementById('login-error');
    if (!code) return;
    err.style.display = 'none';
    btn.disabled = true; btn.textContent = 'Checking…';
    rpc('get_portal', { p_code: code }).then(function (data) {
      btn.disabled = false; btn.textContent = 'Enter Portal';
      if (!data) { err.style.display = 'block'; return; }
      CURRENT_CODE = code;
      sessionStorage.setItem('oc_code', code);
      showPortal(data);
    }).catch(function () {
      btn.disabled = false; btn.textContent = 'Enter Portal';
      err.textContent = 'Could not connect. Try again.';
      err.style.display = 'block';
    });
  }

  function logout() {
    sessionStorage.removeItem('oc_code');
    CURRENT_CODE = null;
    document.getElementById('portal').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('pw').value = '';
    window.scrollTo(0, 0);
  }

  function showPortal(data) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('portal').style.display = 'block';
    render(data);
    window.scrollTo(0, 0);
  }

  // ── Helpers ──
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function fmtPipeDate(iso) {
    if (!iso) return '';
    const p = iso.split('-');
    return MONTHS[parseInt(p[1], 10) - 1] + ' ' + parseInt(p[2], 10);
  }
  function mixCategory(channel) {
    const c = (channel || '').toLowerCase();
    if (c.indexOf('reel') > -1) return 'Reels';
    if (c.indexOf('story') > -1) return 'Stories';
    if (c.indexOf('blog') > -1) return 'Blog';
    if (c.indexOf('gbp') > -1) return 'GBP Posts';
    return 'Static Posts';
  }
  function scrollToEl(id) {
    const el = document.getElementById(id);
    if (!el) return;
    const y = el.getBoundingClientRect().top + window.pageYOffset - 80;
    window.scrollTo({ top: y, behavior: 'smooth' });
  }

  // ── Render ──
  function render(data) {
    const c = data.client || {};
    document.getElementById('tb-client').textContent = c.name + (c.contact_name ? ' · ' + c.contact_name : '');

    const posts = data.posts || [];
    const pipe = posts.filter(function (p) { return p.in_pipeline || p.status === 'approval' || p.status === 'scheduled'; });
    const needApproval = pipe.filter(function (p) { return p.status === 'approval'; });

    let h = '';

    // ── Project header ──
    h += '<div class="kicker">Active Project</div>';
    h += '<h1 class="display">' + esc(c.project_title) + '</h1>';
    h += '<p class="lede">' + esc(c.project_started) + '</p>';

    // attention banner
    if (needApproval.length) {
      h += '<div class="alert" onclick="scrollToEl(\'sec-approvals\')">';
      h += '<div class="alert-dot">' + needApproval.length + '</div>';
      h += '<div class="alert-text"><strong>' + needApproval.length + ' post' + (needApproval.length > 1 ? 's' : '') + ' need' + (needApproval.length > 1 ? '' : 's') + ' your approval.</strong> Review and lock them in below.</div>';
      h += '<div class="alert-go">Review →</div></div>';
    }

    // hero card
    h += '<div class="hero"><div class="hero-body"><div class="hero-left">';
    h += '<h2>' + esc(c.name) + '</h2><p>' + esc(c.project_subtitle) + '</p></div>';
    h += '<div class="badge-stack">';
    if (c.status_badge)   h += '<span class="pill live">' + esc(c.status_badge) + '</span>';
    if (c.setup_badge)    h += '<span class="pill">' + esc(c.setup_badge) + '</span>';
    if (c.retainer_badge) h += '<span class="pill">' + esc(c.retainer_badge) + '</span>';
    h += '</div></div>';
    h += '<div class="hero-foot">';
    h += '<span>Last updated by OnCue: <strong>' + esc(c.last_updated) + '</strong></span>';
    h += '<span>Project manager: <strong>' + esc(c.pm_name) + '</strong></span>';
    h += '</div></div>';

    // ── Package + quotas ──
    h += '<div class="sec"><div class="package"><div class="package-left">';
    h += '<div class="package-eyebrow">Current Package</div>';
    h += '<div class="package-name">' + esc(c.package_name);
    if (c.package_sub) h += '<small>' + esc(c.package_sub) + '</small>';
    h += '</div></div><div class="quota-grid">';
    (data.quotas || []).forEach(function (q) {
      const pct = q.total > 0 ? Math.round(q.used / q.total * 100) : 0;
      h += '<div class="quota-item"><div class="quota-count"><span class="used">' + q.used + '</span><span class="of">/' + q.total + '</span></div>';
      h += '<div class="quota-label">' + esc(q.label) + '</div>';
      h += '<div class="quota-bar' + (pct >= 100 ? ' full' : '') + '"><span style="width:' + Math.min(pct, 100) + '%"></span></div></div>';
    });
    h += '</div></div></div>';

    // ── Phases ──
    h += '<div class="sec"><div class="sec-head"><div class="sec-title">Project Phases</div></div>';
    h += '<div class="phases">';
    (data.phases || []).forEach(function (p) {
      const cls = p.status === 'done' ? 'is-done' : (p.status === 'active' ? 'is-active' : '');
      const label = p.status === 'done' ? 'Complete' : (p.status === 'active' ? 'In Progress' : 'Upcoming');
      h += '<div class="phase ' + cls + '"><div class="phase-num">' + esc(p.num) + '</div>';
      h += '<div class="phase-name">' + esc(p.name) + '</div>';
      h += '<span class="phase-status ' + esc(p.status) + '">' + label + '</span></div>';
    });
    h += '</div></div>';

    // ── Next steps + Decisions ──
    h += '<div class="sec"><div class="two-col">';
    h += '<div class="card"><div class="card-label">Next Steps</div>';
    h += '<div class="legend"><div class="legend-item"><div class="legend-dot" style="background:var(--ink)"></div>OnCue</div>';
    h += '<div class="legend-item"><div class="legend-dot" style="background:var(--rust)"></div>' + esc(c.contact_name || 'You') + '</div></div>';
    h += '<ul class="steps">';
    (data.next_steps || []).forEach(function (s) {
      const ownerLabel = s.owner === 'oncue' ? 'OnCue' : (s.owner === 'client' ? esc(c.contact_name || 'You') : 'Waiting');
      h += '<li class="step"><div class="step-dot ' + esc(s.owner) + '"></div>';
      h += '<div class="step-text">' + esc(s.body) + '</div>';
      h += '<div class="step-owner ' + esc(s.owner) + '">' + ownerLabel + '</div></li>';
    });
    h += '</ul></div>';

    h += '<div class="card"><div class="card-label">Decisions Log</div>';
    (data.decisions || []).forEach(function (d) {
      h += '<div class="decision"><div class="decision-date">' + esc(d.date) + '</div>';
      h += '<div class="decision-text">' + esc(d.body) + '</div></div>';
    });
    h += '</div></div></div>';

    // ── Deliverables ──
    h += '<div class="sec"><div class="sec-head"><div class="sec-title">Deliverables</div></div>';
    h += '<div class="card">';
    (data.deliverables || []).forEach(function (d) {
      h += '<div class="deliverable"><div class="deliverable-icon">' + esc(d.icon) + '</div>';
      h += '<div class="deliverable-name">' + esc(d.name) + '</div>';
      if (d.link) h += '<a class="deliverable-link" href="' + esc(d.link) + '" target="_blank" rel="noopener">View →</a>';
      else h += '<span class="deliverable-status">' + esc(d.status) + '</span>';
      h += '</div>';
    });
    h += '</div></div>';

    // ── Content calendar ──
    h += '<hr class="divider"/>';
    h += '<div class="sec-head"><div><div class="kicker">Content Calendar</div>';
    h += '<div class="sec-title" style="font-size:26px;">What\u2019s going out &amp; when</div></div></div>';
    h += '<p class="sec-note" style="margin-bottom:22px;max-width:62ch;">Every planned post this month, the channel it runs on, and where it sits in the approval pipeline. Click a post to view the creative.</p>';
    h += '<div class="cal-toolbar"><div class="cal-month">' + esc(c.cal_label) + '</div><div class="cal-legend">';
    h += '<div class="legend-item"><div class="legend-dot" style="background:var(--muted-2)"></div>Drafting</div>';
    h += '<div class="legend-item"><div class="legend-dot" style="background:var(--rust)"></div>Needs Approval</div>';
    h += '<div class="legend-item"><div class="legend-dot" style="background:var(--ink)"></div>Scheduled</div>';
    h += '<div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Published</div>';
    h += '</div></div>';
    h += buildCalendar(c.cal_year, c.cal_month, posts);

    // ── Content mix ──
    const mixOrder = ['Static Posts', 'Reels', 'Stories', 'Blog', 'GBP Posts'];
    const mix = { 'Static Posts': 0, 'Reels': 0, 'Stories': 0, 'Blog': 0, 'GBP Posts': 0 };
    posts.forEach(function (p) { mix[mixCategory(p.channel)]++; });
    h += '<div class="sec"><div class="sec-head"><div class="sec-title" style="font-size:18px;">This month\u2019s content mix</div></div>';
    h += '<div class="mix-grid">';
    mixOrder.forEach(function (k) {
      h += '<div class="mix-item"><div class="mix-count">' + mix[k] + '</div><div class="mix-label">' + k + '</div></div>';
    });
    h += '<div class="mix-item total"><div class="mix-count">' + posts.length + '</div><div class="mix-label">Total Planned</div></div>';
    h += '</div></div>';

    // ── Approval pipeline ──
    h += '<div class="sec" id="sec-approvals"><div class="card"><div class="card-label">Posts Awaiting Your Approval';
    if (needApproval.length) h += '<span class="card-count">' + needApproval.length + ' to review</span>';
    h += '</div>';
    pipe.forEach(function (p) {
      const stageLabel = p.status === 'approval' ? 'Needs Approval' : (p.status === 'scheduled' ? 'Scheduled' : (p.status === 'published' ? 'Published' : 'Drafting'));
      h += '<div class="pipe-row" data-post="' + esc(p.id) + '">';
      h += '<div class="pipe-date">' + fmtPipeDate(p.date) + '</div>';
      h += '<div class="pipe-type">' + esc(p.channel) + '</div>';
      h += '<div class="pipe-title">' + esc(p.title) + '</div>';
      h += '<span class="pipe-stage s-' + esc(p.status) + '">' + stageLabel + '</span>';
      h += '<div class="pipe-actions">';
      if (p.script) h += '<a class="pipe-btn record" href="' + teleprompterUrl(p) + '" target="_blank" rel="noopener">● Record Video</a>';
      if (p.content_url) h += '<a class="pipe-btn view" href="' + esc(p.content_url) + '" target="_blank" rel="noopener">View</a>';
      if (p.status === 'approval') {
        h += '<button class="pipe-btn approve" onclick="approvePost(this)">Approve</button>';
        h += '<button class="pipe-btn changes" onclick="requestChanges(this)">Changes</button>';
      } else if (p.status === 'scheduled') {
        h += '<span class="done-tag">Locked in ✓</span>';
      } else if (p.status === 'draft') {
        h += '<span class="done-tag">With OnCue</span>';
      } else {
        h += '<span class="done-tag">Published ✓</span>';
      }
      h += '</div></div>';
    });
    h += '</div></div>';

    // ── Monthly recap ──
    h += '<hr class="divider"/><div class="kicker">Monthly Recap</div>';
    h += '<div class="sec-title" style="font-size:26px;margin-bottom:18px;">' + esc(c.recap_month) + '</div>';
    h += '<div class="recap-card"><div class="card-label">What we did this month</div>';
    h += '<div class="recap-body">';
    (c.recap_body || '').split('\n\n').forEach(function (para) { if (para.trim()) h += '<p>' + esc(para) + '</p>'; });
    h += '</div></div>';

    // ── Contact ──
    h += '<div class="contact"><div><div class="kicker">Questions?</div>';
    h += '<h3>Reach Michael directly</h3></div>';
    h += '<div class="contact-links">';
    h += '<a class="contact-link" href="mailto:hello@oncue.site">hello@oncue.site</a>';
    h += '<a class="contact-link alt" href="tel:+61447542930">+61 447 542 930</a>';
    h += '</div></div>';

    document.getElementById('portal-main').innerHTML = h;
  }

  function buildCalendar(year, month, posts) {
    if (!year || !month) return '';
    const dow = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
    let g = '<div class="cal-grid">';
    dow.forEach(function (d) { g += '<div class="cal-dow">' + d + '</div>'; });

    const byDay = {};
    posts.forEach(function (p) {
      if (!p.date) return;
      const parts = p.date.split('-');
      if (parseInt(parts[0], 10) === year && parseInt(parts[1], 10) === month) {
        const day = parseInt(parts[2], 10);
        (byDay[day] = byDay[day] || []).push(p);
      }
    });

    const firstWeekday = new Date(year, month - 1, 1).getDay();
    const lead = (firstWeekday + 6) % 7;
    const days = new Date(year, month, 0).getDate();
    const now = new Date();
    const isThisMonth = now.getFullYear() === year && (now.getMonth() + 1) === month;

    for (let i = 0; i < lead; i++) g += '<div class="cal-cell empty"></div>';
    for (let d = 1; d <= days; d++) {
      const weekday = new Date(year, month - 1, d).getDay();
      const isWeekend = weekday === 0 || weekday === 6;
      const dayPosts = byDay[d] || [];
      const emptyCls = (isWeekend && dayPosts.length === 0) ? ' empty' : '';
      const todayCls = (isThisMonth && now.getDate() === d) ? ' today' : '';
      g += '<div class="cal-cell' + emptyCls + todayCls + '"><div class="cal-date">' + d + '</div>';
      dayPosts.forEach(function (p) {
        const tag = p.content_url ? 'a' : 'span';
        const href = p.content_url ? ' href="' + esc(p.content_url) + '" target="_blank" rel="noopener"' : '';
        g += '<' + tag + ' class="cal-post s-' + esc(p.status) + '"' + href + '>';
        g += '<span class="ct">' + esc(p.channel) + '</span>' + esc(p.title) + '</' + tag + '>';
      });
      g += '</div>';
    }
    const total = lead + days;
    const trail = (7 - (total % 7)) % 7;
    for (let i = 0; i < trail; i++) g += '<div class="cal-cell empty"></div>';
    g += '</div>';
    return g;
  }

  // ── Decisions (write to Supabase) ──
  function decide(btn, decision) {
    const row = btn.closest('.pipe-row');
    const postId = row.getAttribute('data-post');
    const actions = row.querySelector('.pipe-actions');
    let note = null;
    if (decision === 'changes') {
      note = prompt('What would you like changed? Michael will see this note.');
      if (note === null) return;
    }
    const prevHTML = actions.innerHTML;
    actions.innerHTML = '<span class="done-tag">Sending…</span>';
    rpc('submit_decision', { p_code: CURRENT_CODE, p_post_id: postId, p_decision: decision, p_note: note })
      .then(function (res) {
        if (!res || !res.ok) throw new Error('rejected');
        const stage = row.querySelector('.pipe-stage');
        if (decision === 'approved') {
          stage.className = 'pipe-stage s-scheduled';
          stage.textContent = 'Approved';
          actions.innerHTML = '<span class="done-tag">Approved ✓</span>';
        } else {
          stage.className = 'pipe-stage s-draft';
          stage.textContent = 'Changes Requested';
          actions.innerHTML = '<span class="done-tag">Sent to OnCue ✓</span>';
        }
        refreshAlert();
      }).catch(function () {
        actions.innerHTML = '<span class="done-tag" style="color:var(--rust)">Failed — retry</span>';
        setTimeout(function () { actions.innerHTML = prevHTML; }, 1800);
      });
  }
  function approvePost(btn) { decide(btn, 'approved'); }
  function requestChanges(btn) { decide(btn, 'changes'); }

  // keep the attention banner / count in sync after an action
  function refreshAlert() {
    const remaining = document.querySelectorAll('.pipe-stage.s-approval').length;
    const alert = document.querySelector('.alert');
    if (alert && remaining === 0) alert.remove();
    else if (alert) {
      alert.querySelector('.alert-dot').textContent = remaining;
      alert.querySelector('.alert-text').innerHTML = '<strong>' + remaining + ' post' + (remaining > 1 ? 's' : '') + ' need' + (remaining > 1 ? '' : 's') + ' your approval.</strong> Review and lock them in below.';
    }
    const cnt = document.querySelector('.card-count');
    if (cnt) { if (remaining === 0) cnt.remove(); else cnt.textContent = remaining + ' to review'; }
  }

  // ── Enter key + auto-login ──
  document.getElementById('pw').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') tryLogin();
  });

  (function () {
    if (DEMO) {
      // Auto-enter the portal with sample data for preview/sharing.
      CURRENT_CODE = 'demo';
      rpc('get_portal', { p_code: 'demo' }).then(function (data) { if (data) showPortal(data); });
      return;
    }
    // honor ?code=… (used by the admin "Preview as client" link)
    const urlCode = new URLSearchParams(location.search).get('code');
    const saved = urlCode || sessionStorage.getItem('oc_code');
    if (!saved) return;
    CURRENT_CODE = saved;
    rpc('get_portal', { p_code: saved }).then(function (data) {
      if (data) showPortal(data);
      else sessionStorage.removeItem('oc_code');
    }).catch(function () {});
  })();
